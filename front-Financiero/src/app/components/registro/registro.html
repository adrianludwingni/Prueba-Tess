<div class="registro-container">
    <h2>Crear <span>cuenta</span></h2>

    <form (ngSubmit)="registrar()">

        <input [(ngModel)]="usuario.nombre" name="nombre" placeholder="Nombre completo">

        <input [(ngModel)]="usuario.correo" name="correo" type="email" placeholder="Correo electrónico">

        <input [(ngModel)]="usuario.celular" name="celular" type="tel" placeholder="Número de celular">

        <input [(ngModel)]="usuario.password" name="password" type="password" placeholder="Contraseña">

        <button type="submit">Registrarse</button>

    </form>

    <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
</div>
